# EAS hyperparameter search bounds for Optuna
eas_population_size:
  type: int
  low: 10
  high: 50
eas_num_generations:
  type: int
  low: 10
  high: 100
eas_min_filters:
  type: categorical
  choices: [8, 16]
eas_max_filters:
  type: categorical
  choices: [128, 256, 512]
eas_mutation_rate:
  type: float
  low: 0.1
  high: 0.5
hosvd_rank_0:
  type: float
  low: 0.5
  high: 1.0
hosvd_rank_1:
  type: float
  low: 0.5
  high: 1.0
hosvd_rank_2:
  type: float
  low: 0.5
  high: 1.0
