# GAN hyperparameter search bounds for Optuna
gan_base_filters:
  type: categorical
  choices: [16, 32, 64]
gan_depth:
  type: int
  low: 3
  high: 5
gan_lambda_dice:
  type: float
  low: 0.5
  high: 2.0
gan_lambda_gan:
  type: float
  low: 0.05
  high: 0.5
gan_lambda_laplace:
  type: float
  low: 0.01
  high: 0.2
gan_lr_g:
  type: float
  low: 1.0e-5
  high: 1.0e-3
  log: true
gan_lr_d:
  type: float
  low: 1.0e-5
  high: 1.0e-3
  log: true
gan_mode:
  type: categorical
  choices: [lsgan, vanilla]
