[workspace]
name = "sulcal-segmentation"
version = "1.0.0"
description = "Lifespan-robust sulcal segmentation via EAS, multi-label GAN, and Laplace constraints"
authors = ["Barthélémy Drabczuk <barthelemy.drabczuk@cea.fr>"]
channels = ["conda-forge", "pytorch", "nvidia"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10,<3.12"
pytorch = { version = ">=2.0", channel = "pytorch" }
pytorch-cuda = { version = "12.1.*", channel = "pytorch" }
numpy = ">=1.24"
scipy = ">=1.10"
scikit-learn = ">=1.3"
nibabel = ">=5.0"
scikit-image = ">=0.21"
tqdm = ">=4.65"
matplotlib = ">=3.7"
seaborn = ">=0.12"
tensorboard = ">=2.13"
pydantic = ">=2.0"
pyyaml = ">=6.0"
click = ">=8.1"
pandas = ">=2.0"
tensorly = ">=0.8"
opt-einsum = ">=3.3"
hatchling = "*"
black = ">=23.0"
ruff = ">=0.1"
mypy = ">=1.4"
pytest = ">=7.4"
pytest-cov = ">=4.1"
pytest-xdist = ">=3.3"

[pypi-dependencies]
sulcal-seg = { path = ".", editable = true }
loguru = ">=0.7"
trimesh = ">=4.0"
optuna = ">=3.4"
wandb = ">=0.15"

[tasks]
# Setup
setup = "python scripts/setup.py"

# Training tasks
train-eas = "python -m sulcal_seg.experiments.train_eas --config configs/eas.yaml"
train-gan = "python -m sulcal_seg.experiments.train_gan --config configs/gan.yaml"
train-laplace = "python -m sulcal_seg.experiments.train_laplace --config configs/laplace.yaml"
train-full = "python -m sulcal_seg.experiments.train_full --config configs/full_model.yaml"

# Validation tasks
validate = "python -m sulcal_seg.experiments.validate_model --config configs/validate.yaml"
ablation = "python -m sulcal_seg.experiments.run_ablations --config configs/ablations.yaml"

# HPO tasks
hpo-full = "python -m sulcal_seg.experiments.run_hpo --config configs/hpo_full_model.yaml"
hpo-gan = "python -m sulcal_seg.experiments.run_hpo --config configs/hpo_gan_only.yaml"
hpo-monitor = "python scripts/monitor_hpo.py"
hpo-extract-best = "python scripts/extract_best_params.py"

# Code quality
lint = "ruff check src/ tests/ && black --check src/ tests/"
format = "black src/ tests/ && ruff check src/ tests/ --fix"

# Testing
test = "pytest tests/ -v --cov=sulcal_seg --cov-report=html"
test-unit = "pytest tests/unit/ -v"
test-builder = "pytest tests/unit/test_builder.py -v"
test-parallel = "pytest tests/ -n auto -v"
