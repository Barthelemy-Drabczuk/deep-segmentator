[workspace]
name = "sulcal-segmentation"
version = "1.0.0"
description = "Lifespan-robust sulcal segmentation via nnU-Net v2"
authors = ["Barthélémy Drabczuk <barthelemy.drabczuk@cea.fr>"]
channels = ["https://brainvisa.info/neuro-forge", "pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10,<3.12"
pytorch = { version = ">=2.0", channel = "pytorch" }
pytorch-cuda = { version = "12.*", channel = "pytorch" }
numpy = ">=1.24"
scipy = ">=1.10"
scikit-learn = ">=1.3"
nibabel = ">=5.0"
scikit-image = ">=0.21"
tqdm = ">=4.65"
matplotlib = ">=3.7"
seaborn = ">=0.12"
tensorboard = ">=2.13"
pydantic = ">=2.0"
pyyaml = ">=6.0"
click = ">=8.1"
pandas = ">=2.0"
hatchling = "*"
black = ">=23.0"
ruff = ">=0.1"
mypy = ">=1.4"
pytest = ">=7.4"
pytest-cov = ">=4.1"
pytest-xdist = ">=3.3"
h5py = ">=3.9"

[pypi-dependencies]
sulcal-seg = { path = ".", editable = true }
loguru = ">=0.7"
wandb = ">=0.15"
monai = ">=1.2"
nnunetv2 = ">=2.2"

# ── Inference environment (includes soma.aims for BrainVISA .arg output) ──────
# soma-base requires pydantic < 2, which conflicts with the training env.
# Run inference with: pixi run --environment inference <command>
[feature.inference.dependencies]
python = ">=3.8"
numpy = ">=1.24"
scipy = ">=1.10"
nibabel = ">=5.0"
scikit-image = ">=0.21"
click = ">=8.1"
pyyaml = ">=6.0"
h5py = ">=3.9"
soma-env = ">=0.0"
soma = "*"
libjpeg-turbo = { channel = "conda-forge", version = ">=3.0" }

[feature.inference.pypi-dependencies]
sulcal-seg = { path = ".", editable = true }
loguru = ">=0.7"

[environments]
default   = { solve-group = "default" }
inference = { features = ["inference"], no-default-feature = true, solve-group = "inference" }

[tasks]
# Setup
setup = "python scripts/setup.py"

# nnU-Net v2 pipeline (Phase 1)
prepare-nnunet = "python scripts/prepare_nnunet_dataset.py --data-root /neurospin/dico/data/bv_databases/human/not_labeled/hcp/hcp --work-dir ~/nnunet_work/hcp"
train-nnunet = "python scripts/train_monai_nnunet.py --config configs/training.yaml"

# Code quality
lint = "ruff check src/ tests/ && black --check src/ tests/"
format = "black src/ tests/ && ruff check src/ tests/ --fix"

# Testing
test = "pytest tests/ -v --cov=sulcal_seg --cov-report=html"
test-unit = "pytest tests/unit/ -v"
test-parallel = "pytest tests/ -n auto -v"
